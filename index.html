<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Phase 1 - TTML 解析器验证</title>
	<style>
		:root {
			--bg: #1a1a2e;
			--surface: #16213e;
			--text: #e0e0e0;
			--accent: #18a058;
			--error: #e74c3c;
			--border: #2a2a4a;
		}
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: system-ui, sans-serif;
			background: var(--bg);
			color: var(--text);
			padding: 24px;
			min-height: 100vh;
		}
		h1 { font-size: 1.5rem; margin-bottom: 8px; }
		.subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }

		.toolbar {
			display: flex;
			gap: 12px;
			margin-bottom: 24px;
			flex-wrap: wrap;
		}
		button, .btn {
			padding: 8px 16px;
			border: 1px solid var(--border);
			background: var(--surface);
			color: var(--text);
			border-radius: 6px;
			cursor: pointer;
			font-size: 0.9rem;
			transition: all 0.15s;
		}
		button:hover { border-color: var(--accent); background: #1a3a2a; }
		button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
		button.primary:hover { opacity: 0.9; }

		.stats {
			display: flex;
			gap: 24px;
			margin-bottom: 20px;
			flex-wrap: wrap;
		}
		.stat { background: var(--surface); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); }
		.stat .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
		.stat .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

		.section-title {
			font-size: 0.85rem;
			text-transform: uppercase;
			color: #888;
			margin: 16px 0 8px;
			padding-bottom: 4px;
			border-bottom: 1px solid var(--border);
		}

		#log {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 16px;
			max-height: 400px;
			overflow-y: auto;
			font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
			font-size: 0.82rem;
			line-height: 1.5;
			white-space: pre-wrap;
			word-break: break-all;
		}
		#log .error { color: var(--error); }
		#log .success { color: var(--accent); }
		#log .info { color: #5dade2; }

		.lyric-list { margin-top: 16px; }
		.lyric-line {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 8px 12px;
			margin-bottom: 4px;
			display: flex;
			align-items: center;
			gap: 12px;
			font-size: 0.85rem;
		}
		.lyric-line .time { color: #888; font-size: 0.75rem; min-width: 110px; }
		.lyric-line .words { flex: 1; }
		.lyric-line .word {
			display: inline-block;
			padding: 2px 4px;
			margin: 1px;
			background: #2a2a4a;
			border-radius: 3px;
			font-size: 0.8rem;
		}
		.lyric-line .word.has-style { background: #1a3a2a; border: 1px solid var(--accent); }
		.lyric-line .meta { color: #888; font-size: 0.75rem; text-align: right; min-width: 60px; }
	</style>
</head>
<body>
	<h1>Phase 1 — TTML 解析器验证</h1>
	<p class="subtitle">验证 parseTTML() 和 writeTTML() 双向转换的正确性</p>

	<div class="toolbar">
		<input type="file" id="fileInput" accept=".ttml,.xml" style="display:none">
		<button class="primary" id="btnLoad">打开 TTML 文件</button>
		<button id="btnTest">加载内置测试文件</button>
		<button id="btnExport">导出为 TTML</button>
		<button id="btnRoundtrip">双向转换测试</button>
	</div>

	<div class="stats">
		<div class="stat"><div class="label">歌词行数</div><div class="value" id="statLines">0</div></div>
		<div class="stat"><div class="label">单词总数</div><div class="value" id="statWords">0</div></div>
		<div class="stat"><div class="label">总时长</div><div class="value" id="statDur">0:00</div></div>
		<div class="stat"><div class="label">对唱行</div><div class="value" id="statDuet">0</div></div>
	</div>

	<div class="section-title">运行日志</div>
	<div id="log"></div>

	<div class="section-title">歌词行预览</div>
	<div class="lyric-list" id="lyricList"></div>

	<script type="module">
		import { parseTTML } from './js/ttml/parser.js';
		import { writeTTML } from './js/ttml/writer.js';
		import { msToTimestamp } from './js/utils/time.js';

		let currentProject = null;
		const logEl = document.getElementById('log');
		const fileInput = document.getElementById('fileInput');

		function log(msg, type = 'info') {
			const div = document.createElement('div');
			div.className = type;
			div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
			logEl.appendChild(div);
			logEl.scrollTop = logEl.scrollHeight;
		}

		function updateStats(project) {
			const totalWords = project.lyrics.reduce((sum, l) => sum + l.words.length, 0);
			const totalDur = project.lyrics.length > 0
				? Math.max(...project.lyrics.map(l => l.endTime))
				: 0;
			const duetCount = project.lyrics.filter(l => l.isDuet).length;

			document.getElementById('statLines').textContent = project.lyrics.length;
			document.getElementById('statWords').textContent = totalWords;
			document.getElementById('statDur').textContent = msToTimestamp(totalDur, { ms: false });
			document.getElementById('statDuet').textContent = duetCount;
		}

		function renderLyricList(project) {
			const container = document.getElementById('lyricList');
			container.innerHTML = '';
			for (const line of project.lyrics) {
				const div = document.createElement('div');
				div.className = 'lyric-line';

				const time = document.createElement('span');
				time.className = 'time';
				time.textContent = `${msToTimestamp(line.startTime)} → ${msToTimestamp(line.endTime)}`;

				const words = document.createElement('span');
				words.className = 'words';
				for (const w of line.words) {
					const wspan = document.createElement('span');
					wspan.className = 'word' + (w.style ? ' has-style' : '');
					wspan.textContent = w.word || '(空)';
					if (w.style && w.style.scale) {
						wspan.title = `scale: ${w.style.scale}`;
					}
					words.appendChild(wspan);
				}

				const meta = document.createElement('span');
				meta.className = 'meta';
				const parts = [];
				if (line.isDuet) parts.push('对唱');
				if (line.translatedLyric) parts.push('译');
				if (line.romanLyric) parts.push('音');
				if (line.style) parts.push('样式');
				meta.textContent = parts.join(' ');

				div.appendChild(time);
				div.appendChild(words);
				div.appendChild(meta);
				container.appendChild(div);
			}
		}

		function handleFile(file) {
			log(`加载文件: ${file.name}`, 'info');
			const reader = new FileReader();
			reader.onload = () => {
				try {
					const t0 = performance.now();
					currentProject = parseTTML(reader.result);
					const t1 = performance.now();
					log(`解析成功！耗时 ${(t1 - t0).toFixed(1)}ms`, 'success');
					log(`  歌词行: ${currentProject.lyrics.length}`, 'info');
					log(`  版本: ${currentProject.version}`, 'info');
					updateStats(currentProject);
					renderLyricList(currentProject);
				} catch (err) {
					log(`解析失败: ${err.message}`, 'error');
					console.error(err);
				}
			};
			reader.onerror = () => log('文件读取失败', 'error');
			reader.readAsText(file);
		}

		// 加载测试文件
		async function loadTestFile() {
			try {
				const resp = await fetch('./test/Helping Hands.ttml');
				if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
				const text = await resp.text();
				log('加载内置测试文件: Helping Hands.ttml', 'info');
				const t0 = performance.now();
				currentProject = parseTTML(text);
				const t1 = performance.now();
				log(`解析成功！耗时 ${(t1 - t0).toFixed(1)}ms`, 'success');
				log(`  歌词行: ${currentProject.lyrics.length}`, 'info');
				updateStats(currentProject);
				renderLyricList(currentProject);
			} catch (err) {
				log(`加载测试文件失败: ${err.message}`, 'error');
			}
		}

		// 导出 TTML
		function exportTTML() {
			if (!currentProject) {
				log('没有可导出的数据，请先加载文件', 'error');
				return;
			}
			try {
				const ttml = writeTTML(currentProject);
				const blob = new Blob([ttml], { type: 'application/xml' });
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = 'exported.ttml';
				a.click();
				URL.revokeObjectURL(url);
				log(`导出成功，大小: ${ttml.length} 字符`, 'success');
			} catch (err) {
				log(`导出失败: ${err.message}`, 'error');
			}
		}

		// 双向转换测试
		function roundtripTest() {
			if (!currentProject) {
				log('没有数据，请先加载文件', 'error');
				return;
			}
			try {
				const ttml1 = writeTTML(currentProject);
				const project2 = parseTTML(ttml1);
				const ttml2 = writeTTML(project2);

				// 比较数据一致性
				const issues = [];
				if (project2.lyrics.length !== currentProject.lyrics.length) {
					issues.push(`行数不一致: ${currentProject.lyrics.length} → ${project2.lyrics.length}`);
				}
				let totalWords1 = 0, totalWords2 = 0;
				for (let i = 0; i < currentProject.lyrics.length && i < project2.lyrics.length; i++) {
					const l1 = currentProject.lyrics[i];
					const l2 = project2.lyrics[i];
					totalWords1 += l1.words.length;
					totalWords2 += l2.words.length;
					if (l1.words.length !== l2.words.length) {
						issues.push(`行 ${i} 单词数不一致: ${l1.words.length} → ${l2.words.length}`);
					}
				}

				if (issues.length === 0) {
					log('双向转换测试通过！parse→write→parse→write 数据一致', 'success');
					log(`  XML 大小: ${ttml1.length} → ${ttml2.length} 字符`, 'info');
					log(`  总行数: ${currentProject.lyrics.length}`, 'info');
					log(`  总词数: ${totalWords1}`, 'info');
				} else {
					log('双向转换发现问题:', 'error');
					for (const issue of issues) {
						log(`  ${issue}`, 'error');
					}
				}
			} catch (err) {
				log(`双向转换测试失败: ${err.message}`, 'error');
				console.error(err);
			}
		}

		// 事件绑定
		document.getElementById('btnLoad').addEventListener('click', () => fileInput.click());
		fileInput.addEventListener('change', () => {
			if (fileInput.files[0]) handleFile(fileInput.files[0]);
		});
		document.getElementById('btnTest').addEventListener('click', loadTestFile);
		document.getElementById('btnExport').addEventListener('click', exportTTML);
		document.getElementById('btnRoundtrip').addEventListener('click', roundtripTest);

		// 支持拖拽文件
		document.addEventListener('dragover', e => e.preventDefault());
		document.addEventListener('drop', e => {
			e.preventDefault();
			if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
		});

		log('Phase 1 验证页面就绪，请打开 TTML 文件或点击"加载内置测试文件"', 'info');
	</script>
</body>
</html>
